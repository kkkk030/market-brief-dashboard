<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Chief Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>🪙 Crypto Chief Dashboard</h1>
      <p id="generatedAt">로딩 중...</p>
    </header>

    <section class="summary" id="summary"></section>

    <section class="charts">
      <article class="panel">
        <h2>Bitcoin (7D)</h2>
        <canvas id="btcChart"></canvas>
      </article>
      <article class="panel">
        <h2>Ethereum (7D)</h2>
        <canvas id="ethChart"></canvas>
      </article>
    </section>

    <section class="panel">
      <h2>10지표 상세 분석</h2>
      <div id="cryptoIndicators" class="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

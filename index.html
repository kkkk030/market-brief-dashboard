<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코인 - 투자위원회 의견</title>
  <link rel="stylesheet" href="styles.css?v=8" />

  <main class="wrap">

    <section class="summary" id="summary"></section>

      <div id="committeeTop" class="summary"></div>

      <div id="historyModel" class="list"></div>

    <section class="panel">

      <div id="cryptoIndicators" class="list"></div>
